<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Jotlift</title>
<meta name="description" content="Jotlift, a minimal workout logging app.">
<style>
:root{--paper:#FAF6EF;--ink:#211F1B;--ink2:#6b6862;--accent:#186E62;--hair:#e7e0d5;}
@media (prefers-color-scheme:dark){:root{--paper:#101012;--ink:#ECEDEF;--ink2:#9A9DA5;--accent:#57B3A2;--hair:#38383A;}}
*{box-sizing:border-box;}
body{margin:0;background:var(--paper);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
min-height:100vh;display:flex;align-items:center;justify-content:center;}
.wrap{max-width:520px;padding:32px 22px;text-align:center;}
.brand{font-weight:700;font-size:34px;letter-spacing:-0.02em;margin-bottom:8px;}
.brand span{color:var(--ink2);font-weight:600;}
p{font-size:16px;color:var(--ink2);margin:0 0 28px;}
.nav a{color:var(--accent);margin:0 12px;font-size:16px;}
</style>
</head>
<body>
<div class="wrap">
<div class="brand">Jot<span>lift</span></div>
<p>A minimal workout logging app.</p>
<div class="nav">
<a href="/privacy">Privacy</a>
<a href="/terms">Terms</a>
<a href="/delete">Delete account</a>
</div>
</div>
</body>
</html>
